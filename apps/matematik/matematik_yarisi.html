<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Matematik Yarışı - Egit.men</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    body { 
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none; 
      background-color: #f8fafc;
    }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 16px); }

    /* Arka Plan Derinliği */
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }

    /* Ultra Fade Geçişleri */
    .page-enter { animation: ultraFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    @keyframes ultraFadeIn {
      0% { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* Glassmorphism */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
    }

    .hover-lift { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease; }
    .hover-lift:active { transform: scale(0.95); }

    /* İlerleme Çubuğu Animasyonu */
    .progress-bar { transition: width 1s linear; }
  </style>
</head>
<body class="flex justify-center h-screen overflow-hidden bg-slate-900 text-slate-800">

  <!-- Tema Rengi: Matematik için İndigo/Mavi Ambient -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-indigo-500/30 rounded-full blur-[120px] animate-blob"></div>
    <div class="absolute top-[30%] right-[-10%] w-[50%] h-[50%] bg-blue-500/20 rounded-full blur-[100px] animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-[70%] h-[70%] bg-purple-500/20 rounded-full blur-[120px] animate-blob animation-delay-4000"></div>
  </div>

  <div id="root" class="w-full md:max-w-md lg:max-w-2xl h-full relative z-10 flex flex-col mx-auto overflow-hidden"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- SES MOTORU ---
    let audioCtx = null;
    const playSound = (type) => {
      const isMuted = JSON.parse(localStorage.getItem('egit_muted')) || false;
      if (isMuted) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      
      if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
      } else if (type === 'correct') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.setValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      } else if (type === 'fanfare') {
        osc.type = 'square';
        [392.00, 523.25, 659.25, 783.99].forEach((freq, i) => {
          osc.frequency.setValueAtTime(freq, now + (i*0.1));
        });
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
        gain.gain.setValueAtTime(0.15, now + 0.3);
        gain.gain.linearRampToValueAtTime(0, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
      }
    };

    // --- İKONLAR ---
    const IconArrowLeft = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const IconClock = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const IconStar = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

    // Motivasyon Cümleleri
    const MOTIVATIONAL_MESSAGES = [
      "Harika gidiyorsun", 
      "Süpersin", 
      "İşte böyle", 
      "Çok hızlısın", 
      "Aferin", 
      "Mükemmel",
      "Matematik dehası"
    ];

    function App() {
      // Profil Bilgilerini Çek
      const userName = JSON.parse(localStorage.getItem('egit_userName')) || 'Kahraman';
      const userAvatar = JSON.parse(localStorage.getItem('egit_userAvatar')) || '🦸‍♂️';

      // Oyun Durumları: 'intro', 'playing', 'gameover'
      const [gameState, setGameState] = useState('intro');
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(60); // 60 saniye
      
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [options, setOptions] = useState([]);
      const [feedback, setFeedback] = useState(null); // 'correct' veya 'wrong'
      const [motivationMsg, setMotivationMsg] = useState("");

      const timerRef = useRef(null);

      // Soru Üretici
      const generateQuestion = () => {
        const types = ['+', '-'];
        const type = types[Math.floor(Math.random() * types.length)];
        let num1, num2, answer;

        if (type === '+') {
          num1 = Math.floor(Math.random() * 20) + 1;
          num2 = Math.floor(Math.random() * 20) + 1;
          answer = num1 + num2;
        } else {
          num1 = Math.floor(Math.random() * 20) + 10;
          num2 = Math.floor(Math.random() * 10) + 1;
          if (num2 > num1) { const temp = num1; num1 = num2; num2 = temp; }
          answer = num1 - num2;
        }

        const qText = `${num1} ${type} ${num2} = ?`;
        
        // Yanlış şıkları üret
        let opts = new Set([answer]);
        while(opts.size < 4) {
          let wrongAnswer = answer + (Math.floor(Math.random() * 10) - 5);
          if (wrongAnswer > 0 && wrongAnswer !== answer) {
            opts.add(wrongAnswer);
          }
        }
        
        // Karıştır
        const shuffledOptions = Array.from(opts).sort(() => Math.random() - 0.5);

        setCurrentQuestion({ text: qText, answer: answer });
        setOptions(shuffledOptions);
        setFeedback(null);
      };

      // Oyunu Başlat
      const startGame = () => {
        playSound('click');
        setScore(0);
        setTimeLeft(60);
        generateQuestion();
        setGameState('playing');
        
        if (timerRef.current) clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              endGame();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      // Oyunu Bitir ve Puanı Kaydet
      const endGame = () => {
        setGameState('gameover');
        playSound('fanfare');
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

        // Kazanılan puanı ana profile ekle (Doğru cevap başına 5 puan)
        const earnedPoints = score * 5;
        const currentTotalPoints = JSON.parse(localStorage.getItem('egit_points')) || 0;
        localStorage.setItem('egit_points', JSON.stringify(currentTotalPoints + earnedPoints));
      };

      // Cevap Kontrolü
      const handleAnswer = (selected) => {
        if (feedback) return; // Zaten tıklandıysa bekle

        if (selected === currentQuestion.answer) {
          playSound('correct');
          setFeedback('correct');
          setScore(s => s + 1);
          
          // Rastgele motivasyon cümlesi seç
          const randomMsg = MOTIVATIONAL_MESSAGES[Math.floor(Math.random() * MOTIVATIONAL_MESSAGES.length)];
          setMotivationMsg(`${randomMsg} ${userName}!`);

          setTimeout(() => {
            generateQuestion();
          }, 600);
        } else {
          playSound('wrong');
          setFeedback('wrong');
          setMotivationMsg(`Biraz daha dikkatli ol ${userName}!`);
          
          // Yanlışta hemen yeni soruya geçme, biraz beklesin doğrusunu görsün
          setTimeout(() => {
            generateQuestion();
          }, 800);
        }
      };

      // Ana Sayfaya Dön
      const goBack = () => {
        playSound('click');
        // İki üst klasördeki index.html'ye dön (Klasör yapısına göre uyarla)
        // Standalone kullanım için:
        window.history.back(); 
        // Eğer yerelde çalışıyorsa href yönlendirmesi eklenebilir.
      };

      // Bileşen Temizliği
      useEffect(() => {
        return () => { if (timerRef.current) clearInterval(timerRef.current); };
      }, []);


      // --- GÖRÜNÜMLER ---

      if (gameState === 'intro') {
        return (
          <div className="flex-1 flex flex-col items-center justify-center p-6 page-enter">
            <button onClick={goBack} className="absolute top-6 left-6 w-12 h-12 glass-panel rounded-full flex items-center justify-center text-white hover-lift z-20">
              <IconArrowLeft size={24} />
            </button>
            
            <div className="glass-panel rounded-[3rem] p-10 w-full max-w-sm text-center shadow-2xl relative border-2 border-white/20">
              <div className="w-24 h-24 mx-auto bg-gradient-to-br from-indigo-400 to-blue-600 rounded-3xl flex items-center justify-center text-5xl mb-6 shadow-lg rotate-3">
                🚀
              </div>
              <h1 className="text-3xl font-black text-white mb-2 tracking-tight">Matematik Yarışı</h1>
              <p className="text-indigo-100 font-medium mb-8 text-sm leading-relaxed">
                60 saniye içinde ne kadar çok matematik işlemi çözebilirsin {userName}? Görelim!
              </p>
              
              <div className="flex justify-center gap-4 mb-8">
                <div className="bg-white/10 rounded-2xl p-4 flex-1">
                  <p className="text-[10px] text-indigo-200 uppercase tracking-widest font-bold mb-1">Doğru Cevap</p>
                  <p className="text-xl font-black text-white">+5 Puan</p>
                </div>
              </div>

              <button onClick={startGame} className="w-full bg-white text-indigo-900 text-xl font-black py-5 rounded-[1.5rem] shadow-[0_8px_30px_rgb(255,255,255,0.3)] hover-lift flex items-center justify-center gap-3 uppercase tracking-widest">
                Oyuna Başla
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'playing') {
        const timeProgress = (timeLeft / 60) * 100;
        let timerColor = 'bg-emerald-400';
        if (timeLeft < 20) timerColor = 'bg-amber-400';
        if (timeLeft < 10) timerColor = 'bg-red-500 animate-pulse';

        return (
          <div className="flex-1 flex flex-col p-6 page-enter">
            {/* Üst Bar: Süre ve Puan */}
            <div className="glass-panel rounded-[2rem] p-4 flex justify-between items-center mb-8 mt-safe z-10">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-white">
                  <IconClock size={20} />
                </div>
                <div>
                  <p className="text-[10px] text-indigo-200 uppercase tracking-widest font-bold">Kalan Süre</p>
                  <p className={`text-2xl font-black ${timeLeft <= 10 ? 'text-red-400' : 'text-white'}`}>{timeLeft}s</p>
                </div>
              </div>
              
              <div className="flex items-center gap-3 text-right">
                <div>
                  <p className="text-[10px] text-indigo-200 uppercase tracking-widest font-bold">Skor</p>
                  <p className="text-2xl font-black text-white">{score}</p>
                </div>
                <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-xl shadow-inner border-2 border-indigo-200">
                  {userAvatar}
                </div>
              </div>
            </div>

            {/* İlerleme Çubuğu */}
            <div className="w-full h-2 bg-white/10 rounded-full overflow-hidden mb-12">
              <div className={`h-full ${timerColor} progress-bar`} style={{ width: `${timeProgress}%` }}></div>
            </div>

            {/* Oyun Alanı */}
            <div className="flex-1 flex flex-col items-center justify-center max-w-sm mx-auto w-full relative">
              
              {/* Dinamik Motivasyon Metni */}
              <div className="absolute -top-16 text-center w-full">
                <p className={`text-sm font-bold tracking-widest uppercase transition-all duration-300 ${feedback === 'correct' ? 'text-emerald-400 scale-110' : feedback === 'wrong' ? 'text-red-400' : 'text-transparent'}`}>
                  {motivationMsg}
                </p>
              </div>

              {/* Soru Kartı */}
              <div className="w-full glass-panel rounded-[3rem] p-10 flex items-center justify-center mb-8 shadow-2xl relative overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent"></div>
                <h2 className="text-5xl md:text-6xl font-black text-white tracking-widest drop-shadow-lg z-10">
                  {currentQuestion?.text}
                </h2>
              </div>

              {/* Cevap Butonları */}
              <div className="grid grid-cols-2 gap-4 w-full">
                {options.map((opt, index) => {
                  let btnClass = "bg-white/10 text-white border-white/20"; // Varsayılan
                  
                  if (feedback) {
                    if (opt === currentQuestion.answer) {
                      btnClass = "bg-emerald-500 text-white border-emerald-400 scale-105 shadow-[0_0_30px_rgba(16,185,129,0.5)]"; // Doğru olan yeşil
                    } else if (feedback === 'wrong') {
                      btnClass = "bg-red-500/50 text-white/50 border-red-500/30 scale-95 opacity-50"; // Yanlışlar silik kırmızı
                    }
                  }

                  return (
                    <button 
                      key={index}
                      onClick={() => handleAnswer(opt)}
                      disabled={feedback !== null}
                      className={`h-24 rounded-[2rem] text-4xl font-black border-2 backdrop-blur-sm transition-all duration-300 shadow-lg ${btnClass} ${!feedback ? 'hover:bg-white/20 active:scale-95' : ''}`}
                    >
                      {opt}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'gameover') {
        const earnedPoints = score * 5;
        
        return (
          <div className="flex-1 flex flex-col items-center justify-center p-6 page-enter">
            <div className="glass-panel rounded-[3rem] p-10 w-full max-w-sm text-center shadow-2xl border-2 border-white/20 relative overflow-hidden">
              <div className="absolute -top-10 -right-10 p-4 opacity-10 animate-pulse">
                <IconStar size={150} className="text-white"/>
              </div>
              
              <div className="w-24 h-24 mx-auto bg-white rounded-[2rem] flex items-center justify-center text-6xl mb-6 shadow-xl z-10 relative">
                {userAvatar}
              </div>
              
              <h2 className="text-3xl font-black text-white mb-2">Süre Bitti!</h2>
              <p className="text-indigo-200 font-bold mb-8 text-lg">
                Harika bir iş çıkardın, <span className="text-white">{userName}</span>!
              </p>
              
              <div className="bg-white/10 rounded-[2rem] p-6 mb-8 backdrop-blur-sm border border-white/10">
                <div className="flex justify-between items-center mb-4 border-b border-white/10 pb-4">
                  <span className="text-indigo-200 font-bold uppercase tracking-widest text-xs">Doğru Sayısı</span>
                  <span className="text-2xl font-black text-white">{score}</span>
                </div>
                <div className="flex justify-between items-center">
                  <span className="text-amber-300 font-bold uppercase tracking-widest text-xs flex items-center gap-1"><IconStar size={14}/> Kazanılan Puan</span>
                  <span className="text-3xl font-black text-amber-400">+{earnedPoints}</span>
                </div>
              </div>

              <div className="space-y-3 relative z-10">
                <button onClick={startGame} className="w-full bg-white text-indigo-900 font-black text-lg py-4 rounded-[1.5rem] shadow-xl hover-lift uppercase tracking-widest">
                  Tekrar Oyna
                </button>
                <button onClick={goBack} className="w-full bg-indigo-900/50 text-white border border-indigo-400/30 font-bold text-lg py-4 rounded-[1.5rem] hover-lift">
                  Ana Sayfaya Dön
                </button>
              </div>
            </div>
          </div>
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
