<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kelime Avı - Egit.men</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    
    /* Animasyonlar */
    .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(3px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
      40%, 60% { transform: translate3d(5px, 0, 0); }
    }

    .page-enter { animation: pageFadeInSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes pageFadeInSlideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .animate-success-bounce { animation: successBounce 0.6s ease-in-out; }
    @keyframes successBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-15px) scale(1.1); }
    }

    /* Arka plan deseni (Görsel kullanmadan premium doku) */
    .bg-pattern {
      background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
      background-size: 24px 24px;
    }
    
    /* Parlama efekti */
    .glow-effect {
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
    }
  </style>
</head>
<body class="bg-slate-100 flex justify-center h-screen overflow-hidden">

  <!-- Ana Konteyner -->
  <div id="root" class="w-full md:max-w-md bg-white h-full relative shadow-2xl flex flex-col mx-auto bg-pattern"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // --- SES MOTORU (Dışa bağımlılık yok) ---
    let audioCtx = null;
    const playSound = (type, isMuted) => {
      if (isMuted) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;

      switch(type) {
        case 'click': // Harf seçme sesi
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
          osc.start(now); osc.stop(now + 0.05);
          break;
        case 'remove': // Harf geri alma sesi
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
          osc.start(now); osc.stop(now + 0.05);
          break;
        case 'correct': // Kelime bilindiğinde
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, now);
          osc.frequency.setValueAtTime(659.25, now + 0.1);
          osc.frequency.setValueAtTime(783.99, now + 0.2);
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
          gain.gain.linearRampToValueAtTime(0, now + 0.4);
          osc.start(now); osc.stop(now + 0.4);
          break;
        case 'wrong': // Hatalı kelime
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.linearRampToValueAtTime(100, now + 0.2);
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
          gain.gain.linearRampToValueAtTime(0, now + 0.2);
          osc.start(now); osc.stop(now + 0.2);
          break;
        case 'fanfare': // Oyun bitişi
          osc.type = 'square';
          [392.00, 523.25, 659.25, 783.99].forEach((freq, i) => {
            osc.frequency.setValueAtTime(freq, now + (i*0.1));
          });
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
          gain.gain.setValueAtTime(0.2, now + 0.3);
          gain.gain.linearRampToValueAtTime(0, now + 0.6);
          osc.start(now); osc.stop(now + 0.6);
          break;
      }
    };

    // --- İKONLAR ---
    const IconStar = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    const IconX = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const IconArrowLeft = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
    const IconVolume2 = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;
    const IconVolumeX = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>;
    const IconCheck = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;

    // --- OYUN VERİLERİ (Türkçe Kelimeler) ---
    const WORD_LIST = [
      { word: 'KEDİ', emoji: '🐱', bg: 'from-orange-300 to-amber-500' },
      { word: 'ELMA', emoji: '🍎', bg: 'from-red-400 to-rose-600' },
      { word: 'AĞAÇ', emoji: '🌳', bg: 'from-green-400 to-emerald-600' },
      { word: 'AYI', emoji: '🐻', bg: 'from-amber-600 to-amber-800' },
      { word: 'KİTAP', emoji: '📚', bg: 'from-blue-400 to-indigo-600' },
      { word: 'GÜNEŞ', emoji: '☀️', bg: 'from-yellow-300 to-orange-500' },
      { word: 'ÇİÇEK', emoji: '🌸', bg: 'from-pink-300 to-rose-500' },
      { word: 'BALIK', emoji: '🐟', bg: 'from-cyan-400 to-blue-600' }
    ];

    function GameApp() {
      const QUESTIONS_PER_GAME = 5; // Her oyunda 5 kelime sorulur

      const [gameState, setGameState] = useState('loading'); 
      const [isMuted, setIsMuted] = useState(() => JSON.parse(localStorage.getItem('egit_muted')) || false);
      const [score, setScore] = useState(0);
      
      const [gameWords, setGameWords] = useState([]);
      const [currentWordIndex, setCurrentWordIndex] = useState(0);
      
      // Harf Yönetimi
      const [scrambledLetters, setScrambledLetters] = useState([]); // Şıklar [{id, char}]
      const [placedLetters, setPlacedLetters] = useState([]); // Yerleştirilenler [{id, char}]
      const [isErrorShake, setIsErrorShake] = useState(false);
      const [isSuccessAnim, setIsSuccessAnim] = useState(false);

      // Sesi açma/kapama
      const toggleMute = () => {
        playSound('click', !isMuted); 
        setIsMuted(!isMuted);
        localStorage.setItem('egit_muted', JSON.stringify(!isMuted));
      };

      // Yükleme Ekranı
      useEffect(() => {
        if (gameState === 'loading') {
          setTimeout(() => setGameState('start'), 1500);
        }
      }, [gameState]);

      // Diziyi Karıştır
      const shuffleArray = (array) => {
        const newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
      };

      // Yeni Soruyu Hazırla
      const loadQuestion = (wordObj) => {
        const letters = wordObj.word.split('').map((char, index) => ({
          id: `letter-${index}-${Date.now()}`,
          char: char
        }));
        setScrambledLetters(shuffleArray(letters));
        setPlacedLetters([]);
      };

      // Oyunu Başlat
      const startGame = () => {
        playSound('click', isMuted);
        setScore(0);
        setCurrentWordIndex(0);
        
        // Rastgele 5 kelime seç
        const selectedWords = shuffleArray(WORD_LIST).slice(0, QUESTIONS_PER_GAME);
        setGameWords(selectedWords);
        loadQuestion(selectedWords[0]);
        
        setGameState('playing');
      };

      // Harfe Tıkla (Aşağıdan Yukarıya)
      const handleLetterClick = (letterObj) => {
        if (isSuccessAnim || placedLetters.length >= gameWords[currentWordIndex].word.length) return;
        
        playSound('click', isMuted);
        setPlacedLetters([...placedLetters, letterObj]);
        setScrambledLetters(scrambledLetters.filter(l => l.id !== letterObj.id));
      };

      // Yerleştirilen Harfi Geri Al (Yukarıdan Aşağıya)
      const handleRemoveLetter = (letterObj) => {
        if (isSuccessAnim) return;

        playSound('remove', isMuted);
        setPlacedLetters(placedLetters.filter(l => l.id !== letterObj.id));
        setScrambledLetters([...scrambledLetters, letterObj]);
      };

      // Cevap Kontrolü (Tüm kutular dolduğunda otomatik tetiklenir)
      useEffect(() => {
        if (gameState !== 'playing') return;
        
        const currentWord = gameWords[currentWordIndex]?.word;
        if (placedLetters.length > 0 && placedLetters.length === currentWord.length) {
          
          const formedWord = placedLetters.map(l => l.char).join('');
          
          if (formedWord === currentWord) {
            // DOĞRU!
            playSound('correct', isMuted);
            setIsSuccessAnim(true);
            setScore(prev => prev + 20); // Kelime başı 20 puan
            
            // Konfeti patlat (Mini)
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 }, zIndex: 100 });

            setTimeout(() => {
              setIsSuccessAnim(false);
              if (currentWordIndex + 1 < QUESTIONS_PER_GAME) {
                setCurrentWordIndex(prev => prev + 1);
                loadQuestion(gameWords[currentWordIndex + 1]);
              } else {
                endGame();
              }
            }, 1200);

          } else {
            // YANLIŞ!
            playSound('wrong', isMuted);
            setIsErrorShake(true);
            
            setTimeout(() => {
              setIsErrorShake(false);
              // Tüm harfleri geri gönder
              setScrambledLetters([...scrambledLetters, ...placedLetters]);
              setPlacedLetters([]);
            }, 600);
          }
        }
      }, [placedLetters, gameState, currentWordIndex, gameWords, isMuted, scrambledLetters]);


      // Oyunu Bitir
      const endGame = () => {
        setGameState('end');
        playSound('fanfare', isMuted);
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
        
        // Egit.men Ana Puan Sistemine Ekleme
        const savedPoints = JSON.parse(localStorage.getItem('egit_points')) || 0;
        const newTotal = savedPoints + score;
        localStorage.setItem('egit_points', JSON.stringify(newTotal));
      };

      // Ana Sayfaya Dön (Klasör yapısına göre iki üst dizin: ../../index.html)
      const goHome = () => {
        playSound('click', isMuted);
        setTimeout(() => {
          window.location.href = '../../index.html';
        }, 150);
      };

      // --- EKRANLAR ---

      // 0. YÜKLEME EKRANI
      if (gameState === 'loading') {
        return (
          <div className="flex-1 flex flex-col items-center justify-center p-6 text-center page-enter">
            <div className="w-24 h-24 border-8 border-sky-200 border-t-sky-500 rounded-full animate-spin mb-6 shadow-lg"></div>
            <h2 className="text-2xl font-bold text-slate-600 tracking-wide">Kelime Avı Hazırlanıyor...</h2>
          </div>
        );
      }

      // 1. BAŞLANGIÇ EKRANI
      if (gameState === 'start') {
        return (
          <div className="flex-1 flex flex-col items-center justify-center p-6 text-center page-enter relative">
            <button onClick={goHome} className="absolute top-6 left-6 w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center shadow-sm text-slate-600 active:scale-90 transition-transform">
              <IconArrowLeft size={24} />
            </button>
            <button onClick={toggleMute} className="absolute top-6 right-6 w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center shadow-sm text-slate-600 active:scale-90 transition-transform">
              {isMuted ? <IconVolumeX size={24} /> : <IconVolume2 size={24} />}
            </button>

            <div className="w-40 h-40 bg-gradient-to-br from-sky-400 to-blue-600 rounded-[3rem] flex items-center justify-center text-7xl mb-8 shadow-2xl transform rotate-3 glow-effect">
              🔍
            </div>
            <h1 className="text-4xl font-extrabold text-slate-800 mb-4 tracking-tight">Kelime Avı</h1>
            <p className="text-slate-500 font-medium text-lg mb-10 px-4 leading-relaxed">
              Resme bak, harfleri doğru sırayla diz ve kelimeyi bul! Toplam 5 kelime seni bekliyor.
            </p>
            <button onClick={startGame} className="w-full bg-blue-500 text-white text-xl font-bold py-5 rounded-2xl shadow-[0_8px_0_rgb(59,130,246)] active:translate-y-2 active:shadow-none hover:bg-blue-400 transition-all">
              Av Başlasın!
            </button>
          </div>
        );
      }

      // 2. BİTİŞ EKRANI
      if (gameState === 'end') {
        return (
          <div className="flex-1 flex flex-col items-center justify-center p-6 text-center page-enter relative bg-gradient-to-b from-sky-50 to-white">
            <button onClick={toggleMute} className="absolute top-6 right-6 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-slate-600 active:scale-90 transition-transform">
              {isMuted ? <IconVolumeX size={24} /> : <IconVolume2 size={24} />}
            </button>
            
            <div className="text-8xl mb-6 animate-bounce">🎉</div>
            <h2 className="text-3xl font-extrabold mb-2 text-slate-800 uppercase tracking-widest">Harika İş Çıkardın!</h2>
            <p className="text-slate-500 text-lg mb-8">Bütün kelimeleri başarıyla buldun.</p>
            
            <div className="bg-white rounded-[2rem] p-8 mb-10 w-full border-2 border-slate-100 shadow-xl transition-transform hover:scale-105 duration-300">
              <div className="flex items-center justify-center gap-3 text-6xl font-black text-yellow-400 drop-shadow-md">
                +{score} <IconStar size={48} className="fill-yellow-400" />
              </div>
              <p className="text-slate-400 mt-4 font-bold uppercase text-sm tracking-wider">Puanlar Ana Hesaba Eklendi</p>
            </div>

            <button onClick={goHome} className="w-full bg-slate-800 text-white text-xl font-bold py-5 rounded-2xl shadow-lg active:scale-95 hover:bg-slate-700 transition-all">
              Ana Sayfaya Dön
            </button>
          </div>
        );
      }

      // 3. OYUN EKRANI
      const currentWordObj = gameWords[currentWordIndex];
      const wordLength = currentWordObj?.word.length || 0;
      
      // Boş yuvaları oluştur (Yerleştirilen harfler + boşluklar)
      const slots = [];
      for (let i = 0; i < wordLength; i++) {
        slots.push(placedLetters[i] || null);
      }

      return (
        <div className="flex-1 flex flex-col relative page-enter">
          {/* HEADER */}
          <header className="flex justify-between items-center p-4 md:p-6 z-10">
            <button onClick={goHome} className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-slate-600 active:scale-90 transition-transform shadow-sm border border-slate-100">
              <IconX size={24} />
            </button>
            
            {/* İlerleme Noktaları */}
            <div className="flex gap-2">
              {Array.from({ length: QUESTIONS_PER_GAME }).map((_, i) => (
                <div key={i} className={`w-3 h-3 rounded-full transition-all duration-300 ${i < currentWordIndex ? 'bg-green-400' : i === currentWordIndex ? 'bg-blue-500 scale-125' : 'bg-slate-200'}`} />
              ))}
            </div>

            <div className="flex items-center gap-2">
              <div className="flex items-center gap-1 bg-yellow-100 text-yellow-700 px-3 py-1.5 rounded-full font-bold text-base md:text-lg shadow-sm">
                <IconStar size={18} className="fill-yellow-500" /> {score}
              </div>
              <button onClick={toggleMute} className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-600 active:scale-90 transition-transform shadow-sm border border-slate-100">
                {isMuted ? <IconVolumeX size={18} /> : <IconVolume2 size={18} />}
              </button>
            </div>
          </header>

          {/* OYUN ALANI */}
          <main className="flex-1 flex flex-col items-center justify-between p-6 pb-12">
            
            {/* Görsel / Emoji (Premium Kart) */}
            <div className={`w-48 h-48 md:w-56 md:h-56 rounded-[3rem] bg-gradient-to-br ${currentWordObj?.bg} shadow-2xl flex items-center justify-center text-8xl md:text-9xl mb-8 border-4 border-white/50 relative overflow-hidden transition-all duration-500 ${isSuccessAnim ? 'animate-success-bounce glow-effect' : ''}`}>
               {/* Cam efekti yansıması */}
               <div className="absolute top-0 left-0 w-full h-1/2 bg-white/20 rounded-b-full blur-xl transform -translate-y-4"></div>
               {isSuccessAnim ? <IconCheck size={100} className="text-white drop-shadow-lg absolute" /> : currentWordObj?.emoji}
            </div>

            {/* Yerleştirme Yuvaları (Slots) */}
            <div className={`flex justify-center gap-2 md:gap-4 w-full mb-10 ${isErrorShake ? 'animate-shake' : ''}`}>
              {slots.map((slot, i) => (
                <div 
                  key={`slot-${i}`} 
                  onClick={() => slot ? handleRemoveLetter(slot) : null}
                  className={`w-14 h-16 md:w-16 md:h-20 rounded-2xl flex items-center justify-center text-3xl md:text-4xl font-black border-b-4 transition-all ${
                    slot 
                      ? (isSuccessAnim ? 'bg-green-500 text-white border-green-600 shadow-[0_0_15px_rgba(34,197,94,0.5)] scale-105' : 'bg-blue-500 text-white border-blue-600 cursor-pointer animate-pop-in shadow-lg') 
                      : 'bg-slate-200 text-slate-300 border-slate-300 shadow-inner'
                  }`}
                >
                  {slot ? slot.char : ''}
                </div>
              ))}
            </div>

            {/* Dağınık Harfler (Seçenekler) */}
            <div className="w-full mt-auto">
              <p className="text-center text-slate-400 font-bold uppercase text-xs tracking-wider mb-4">Harfleri Seç</p>
              <div className="flex flex-wrap justify-center gap-3 md:gap-4">
                {scrambledLetters.map((letter) => (
                  <button
                    key={letter.id}
                    onClick={() => handleLetterClick(letter)}
                    disabled={isSuccessAnim}
                    className="w-14 h-16 md:w-16 md:h-20 bg-white border-2 border-slate-200 text-slate-700 rounded-2xl text-3xl md:text-4xl font-black shadow-[0_4px_0_rgb(226,232,240)] active:translate-y-1 active:shadow-none transition-all hover:border-blue-300 disabled:opacity-50"
                  >
                    {letter.char}
                  </button>
                ))}
              </div>
            </div>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GameApp />);
  </script>
</body>
</html>
