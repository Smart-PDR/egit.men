<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eş Anlamlı Kelimeler Oyunu</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    html {
        font-size: 16px; 
    }

    body { 
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none; 
      background-color: transparent; 
    }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 16px); }
    
    /* Animasyonlar */
    .page-enter { animation: premiumSlideUp 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes premiumSlideUp {
      0% { opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Ambient Arka Plan Animasyonu */
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }

    /* Glassmorphism ve Premium Kartlar */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .hover-lift {
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
    }
    .hover-lift:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.02);
    }
    .hover-lift:active { transform: translateY(2px) scale(0.96); }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Doğru/Yanlış Seçim Efektleri */
    .btn-correct {
        background: linear-gradient(135deg, #10b981, #059669) !important;
        color: white !important;
        border-color: #047857 !important;
        transform: scale(1.05);
        box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.5) !important;
        z-index: 10;
    }
    .btn-wrong {
        background: linear-gradient(135deg, #ef4444, #dc2626) !important;
        color: white !important;
        border-color: #b91c1c !important;
        transform: scale(0.95);
        opacity: 0.9;
    }
  </style>
</head>
<body class="w-full h-screen overflow-hidden text-slate-800 relative bg-slate-50/80">

  <!-- YENİ EKLENEN: İframe İçi Premium Ambient Arka Plan -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-rose-400/20 rounded-full blur-[100px] animate-blob"></div>
    <div class="absolute top-[20%] right-[-10%] w-[60%] h-[60%] bg-blue-400/20 rounded-full blur-[120px] animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-[-20%] left-[10%] w-[70%] h-[70%] bg-amber-300/20 rounded-full blur-[100px] animate-blob animation-delay-4000"></div>
  </div>

  <div id="root" class="w-full h-full relative z-10 flex flex-col mx-auto max-w-lg md:max-w-2xl overflow-hidden"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- SES MOTORU ---
    let audioCtx = null;
    const playSound = (type) => {
      const isMuted = JSON.parse(localStorage.getItem('egit_muted')) || false;
      if (isMuted) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      
      if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.04);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
        osc.start(now); osc.stop(now + 0.04);
      } else if (type === 'success') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.setValueAtTime(800, now + 0.1);
        osc.frequency.setValueAtTime(1200, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
      } else if (type === 'error') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
      } else if (type === 'fanfare') {
        osc.type = 'triangle';
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
          osc.frequency.setValueAtTime(freq, now + (i*0.08));
        });
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.1, now + 0.04);
        gain.gain.setValueAtTime(0.1, now + 0.24);
        gain.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
      }
    };

    // --- DEVASA KELİME HAVUZU (100+ Kelime) ---
    const WORD_POOL = [
      { w1: 'misafir', w2: 'konuk' }, { w1: 'doktor', w2: 'hekim' }, { w1: 'okul', w2: 'mektep' },
      { w1: 'öğretmen', w2: 'muallim' }, { w1: 'öğrenci', w2: 'talebe' }, { w1: 'kırmızı', w2: 'al' },
      { w1: 'beyaz', w2: 'ak' }, { w1: 'siyah', w2: 'kara' }, { w1: 'yaşlı', w2: 'ihtiyar' },
      { w1: 'cevap', w2: 'yanıt' }, { w1: 'soru', w2: 'sual' }, { w1: 'kelime', w2: 'sözcük' },
      { w1: 'cümle', w2: 'tümce' }, { w1: 'yıl', w2: 'sene' }, { w1: 'güz', w2: 'sonbahar' },
      { w1: 'anı', w2: 'hatıra' }, { w1: 'rüya', w2: 'düş' }, { w1: 'isim', w2: 'ad' },
      { w1: 'şehir', w2: 'kent' }, { w1: 'kalp', w2: 'yürek' }, { w1: 'zaman', w2: 'vakit' },
      { w1: 'rüzgar', w2: 'yel' }, { w1: 'nehir', w2: 'ırmak' }, { w1: 'doğa', w2: 'tabiat' },
      { w1: 'vatan', w2: 'yurt' }, { w1: 'millet', w2: 'ulus' }, { w1: 'sebep', w2: 'neden' },
      { w1: 'sonuç', w2: 'netice' }, { w1: 'fayda', w2: 'yarar' }, { w1: 'zarar', w2: 'ziyan' },
      { w1: 'lider', w2: 'önder' }, { w1: 'barış', w2: 'sulh' }, { w1: 'savaş', w2: 'harp' },
      { w1: 'özlem', w2: 'hasret' }, { w1: 'yetenek', w2: 'kabiliyet' }, { w1: 'görev', w2: 'vazife' },
      { w1: 'yoksul', w2: 'fakir' }, { w1: 'zengin', w2: 'varlıklı' }, { w1: 'mutlu', w2: 'mesut' },
      { w1: 'üzüntü', w2: 'keder' }, { w1: 'hediye', w2: 'armağan' }, { w1: 'sağlık', w2: 'sıhhat' },
      { w1: 'ıssız', w2: 'tenha' }, { w1: 'kirli', w2: 'pis' }, { w1: 'temiz', w2: 'pak' },
      { w1: 'cesur', w2: 'yürekli' }, { w1: 'korkak', w2: 'ödlek' }, { w1: 'cimri', w2: 'pinti' },
      { w1: 'acele', w2: 'çabuk' }, { w1: 'adalet', w2: 'hak' }, { w1: 'akıl', w2: 'us' },
      { w1: 'alaka', w2: 'ilgi' }, { w1: 'amaç', w2: 'gaye' }, { w1: 'aniden', w2: 'birden' },
      { w1: 'arzu', w2: 'istek' }, { w1: 'aş', w2: 'yemek' }, { w1: 'ayakkabı', w2: 'pabuç' },
      { w1: 'bağışlama', w2: 'affetme' }, { w1: 'baş', w2: 'kafa' }, { w1: 'bellek', w2: 'hafıza' },
      { w1: 'biçim', w2: 'şekil' }, { w1: 'cılız', w2: 'zayıf' }, { w1: 'davet', w2: 'çağrı' },
      { w1: 'defa', w2: 'kez' }, { w1: 'değer', w2: 'kıymet' }, { w1: 'deprem', w2: 'zelzele' },
      { w1: 'dergi', w2: 'mecmua' }, { w1: 'dil', w2: 'lisan' }, { w1: 'dost', w2: 'arkadaş' },
      { w1: 'duygu', w2: 'his' }, { w1: 'düşünce', w2: 'fikir' }, { w1: 'endişe', w2: 'kaygı' },
      { w1: 'eser', w2: 'yapıt' }, { w1: 'ev', w2: 'konut' }, { w1: 'fena', w2: 'kötü' },
      { w1: 'giysi', w2: 'elbise' }, { w1: 'gök', w2: 'sema' }, { w1: 'harf', w2: 'imce' },
      { w1: 'hayat', w2: 'yaşam' }, { w1: 'hürriyet', w2: 'özgürlük' }, { w1: 'ikaz', w2: 'uyarı' },
      { w1: 'ilave', w2: 'ek' }, { w1: 'imtihan', w2: 'sınav' }, { w1: 'nesil', w2: 'kuşak' },
      { w1: 'sır', w2: 'giz' }, { w1: 'uçurum', w2: 'yar' }, { w1: 'umut', w2: 'ümit' },
      { w1: 'uzak', w2: 'ırak' }, { w1: 'vilayet', w2: 'il' }, { w1: 'zor', w2: 'güç' }
    ];

    // --- MOTİVASYON CÜMLELERİ ---
    const MOTIVATIONS = [
       "Harika gidiyorsun {name}!",
       "Sen bir dâhisisin {name}!",
       "Mükemmel ilerliyorsun!",
       "İşte böyle {name}, durmak yok!",
       "Çok zekisin {name}!",
       "Böyle devam et şampiyon!",
       "Seni kimse tutamaz {name}!",
       "Efsane bir cevap daha!"
    ];

    // --- İKONLAR ---
    const IconBook = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const IconGamepad = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>;
    const IconArrowRight = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const IconCheck = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
    const IconStar = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    const IconInfo = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;

    // Ana Uygulama
    function App() {
      const [view, setView] = useState('menu'); // menu, learn, play, result
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [motivationStr, setMotivationStr] = useState("");

      const userName = localStorage.getItem('egit_userName') || 'Kahraman';

      // Oyunu Başlatma Mantığı
      const startNewGame = () => {
         playSound('click');
         // Soruları hazırla
         const shuffledWords = [...WORD_POOL].sort(() => 0.5 - Math.random());
         const selectedPairs = shuffledWords.slice(0, 10);
         
         const newQuestions = selectedPairs.map(pair => {
            const correctAnswer = pair.w2;
            let options = [correctAnswer];
            
            while(options.length < 4) {
               const randWord = WORD_POOL[Math.floor(Math.random() * WORD_POOL.length)].w2;
               if(!options.includes(randWord)) options.push(randWord);
            }
            
            return {
               question: pair.w1,
               correct: correctAnswer,
               options: options.sort(() => 0.5 - Math.random())
            };
         });

         setQuestions(newQuestions);
         setCurrentIndex(0);
         setScore(0);
         setSelectedOption(null);
         generateMotivation();
         setView('play');
      };

      const generateMotivation = () => {
         const randomMoti = MOTIVATIONS[Math.floor(Math.random() * MOTIVATIONS.length)];
         setMotivationStr(randomMoti.replace('{name}', userName));
      };

      const handleOptionClick = (option) => {
         if (selectedOption) return; // Zaten tıklandıysa bekle
         
         setSelectedOption(option);
         const isCorrect = option === questions[currentIndex].correct;
         const newScore = isCorrect ? score + 1 : score; // Güncel skoru hesapla
         
         if (isCorrect) {
             playSound('success');
             setScore(newScore);
         } else {
             playSound('error');
         }

         setTimeout(() => {
             if (currentIndex + 1 < questions.length) {
                 setCurrentIndex(c => c + 1);
                 setSelectedOption(null);
                 if(isCorrect) generateMotivation(); // Sadece doğru bildiyse yeni motivasyon
             } else {
                 // Oyun bitti, final skoru yolluyoruz ki Closure hatasıyla beyaz ekran olmasın
                 finishGame(newScore);
             }
         }, 1200);
      };

      // YENİ EKLENEN: Tam doğru sayısına (finalScore) göre XP ekleyen ve sayfayı kusursuz geçiren kod
      const finishGame = (finalScore) => {
         if (finalScore > 0) {
             const currentPoints = parseInt(localStorage.getItem('egit_points') || '0', 10);
             localStorage.setItem('egit_points', currentPoints + finalScore);
         }
         
         playSound('fanfare');
         confetti({ particleCount: 200, spread: 120, origin: { y: 0.5 }, colors: ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b'] });
         setView('result');
      };

      // --- EKRANLAR ---

      // 1. MENU EKRANI
      if (view === 'menu') {
          return (
             <div className="flex-1 flex flex-col p-4 md:p-8 h-full page-enter overflow-y-auto no-scrollbar pt-safe pb-safe z-10 relative">
                <div className="glass-panel rounded-[2.5rem] bg-gradient-to-br from-rose-500 via-red-500 to-red-600 p-8 text-white shadow-[0_20px_40px_-15px_rgba(225,29,72,0.4)] relative overflow-hidden text-center mb-6 shrink-0 border border-white/40">
                    <div className="absolute -top-10 -left-10 text-9xl opacity-10 drop-shadow-lg">📚</div>
                    <div className="absolute -bottom-10 -right-10 text-9xl opacity-10 rotate-12 drop-shadow-lg">🎮</div>
                    <h2 className="text-3xl md:text-4xl font-black mb-2 tracking-tight relative z-10">Eş Anlamlı Kelimeler</h2>
                    <p className="text-rose-100 font-medium text-sm md:text-base opacity-90 relative z-10">Kelimelerin gizli ikizlerini bul!</p>
                </div>

                <div className="grid grid-cols-1 gap-4 flex-1">
                    <button onClick={() => { playSound('click'); setView('learn'); }} className="glass-panel p-6 rounded-[2rem] flex items-center gap-6 hover-lift bg-white/80 shadow-md">
                       <div className="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-amber-100 to-amber-200 text-amber-600 flex items-center justify-center shadow-inner border border-white shrink-0">
                          <IconBook size={32} />
                       </div>
                       <div className="text-left flex-1">
                          <h3 className="text-xl font-black text-slate-800 mb-1">Öğrenme Alanı</h3>
                          <p className="text-xs font-bold text-slate-500">Eş anlam nedir? Örnekleri incele.</p>
                       </div>
                       <div className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 text-slate-400">
                          <IconArrowRight size={20} />
                       </div>
                    </button>

                    <button onClick={startNewGame} className="glass-panel p-6 rounded-[2rem] flex items-center gap-6 hover-lift bg-white/80 shadow-md">
                       <div className="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-blue-100 to-blue-200 text-blue-600 flex items-center justify-center shadow-inner border border-white shrink-0">
                          <IconGamepad size={32} />
                       </div>
                       <div className="text-left flex-1">
                          <h3 className="text-xl font-black text-slate-800 mb-1">Oyuna Başla</h3>
                          <p className="text-xs font-bold text-slate-500">Hazırsan bilgini test et!</p>
                       </div>
                       <div className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 text-slate-400">
                          <IconArrowRight size={20} />
                       </div>
                    </button>
                </div>
             </div>
          );
      }

      // 2. ÖĞRENME EKRANI
      if (view === 'learn') {
          return (
             <div className="flex-1 flex flex-col h-full page-enter z-10 relative">
                <div className="p-4 md:p-8 flex-1 overflow-y-auto no-scrollbar pb-32">
                    <div className="glass-panel rounded-[2rem] p-6 mb-6 bg-white/90 shadow-md">
                       <h2 className="text-xl font-black text-slate-800 mb-3 flex items-center gap-2">
                           <span className="text-2xl drop-shadow-sm">💡</span> Eş Anlam (Anlamdaş) Nedir?
                       </h2>
                       <p className="text-slate-600 text-sm font-medium leading-relaxed">
                          Yazılışları ve okunuşları <strong className="text-slate-800 bg-rose-100 px-1 rounded">farklı</strong>, fakat anlamları <strong className="text-slate-800 bg-emerald-100 px-1 rounded">aynı</strong> olan kelimelere eş anlamlı kelimeler denir. Bu kelimeler cümle içinde birbirinin yerine kullanılabilir ve cümlenin anlamı bozulmaz.
                       </p>
                    </div>

                    <h3 className="font-bold text-xs text-slate-400 uppercase tracking-widest mb-4 ml-2 flex items-center gap-2">Örnek Kelimeler <span className="h-px bg-slate-200 flex-1"></span></h3>
                    <div className="grid grid-cols-2 gap-3">
                        {WORD_POOL.slice(0, 30).map((pair, idx) => (
                           <div key={idx} className="glass-panel px-4 py-3 rounded-2xl flex justify-between items-center text-sm font-bold bg-white/70 border border-white shadow-sm hover:scale-[1.02] transition-transform cursor-default">
                              <span className="text-slate-700">{pair.w1}</span>
                              <span className="text-slate-300 mx-2">=</span>
                              <span className="text-rose-500">{pair.w2}</span>
                           </div>
                        ))}
                    </div>
                    <p className="text-center text-xs font-bold text-slate-400 mt-6 mb-4 italic">...ve daha yüzlercesi oyunun içinde seni bekliyor!</p>
                </div>

                <div className="fixed bottom-0 left-0 w-full p-4 pb-safe bg-gradient-to-t from-slate-100 via-slate-100/90 to-transparent">
                   <button onClick={startNewGame} className="w-full bg-gradient-to-r from-slate-800 to-slate-900 text-white font-bold text-lg py-5 rounded-[1.5rem] shadow-[0_10px_20px_-5px_rgba(0,0,0,0.3)] hover-lift flex items-center justify-center gap-3">
                      Anladım, Oyuna Başla <IconGamepad size={20}/>
                   </button>
                </div>
             </div>
          );
      }

      // 3. OYUN EKRANI
      if (view === 'play') {
          const currentQ = questions[currentIndex];
          const progressPercent = ((currentIndex) / questions.length) * 100;

          return (
             <div className="flex-1 flex flex-col p-4 md:p-8 h-full page-enter overflow-hidden pt-safe pb-safe z-10 relative">
                 
                 {/* Üst Kısım: Progress & Motivasyon */}
                 <div className="shrink-0 mb-6">
                     <div className="flex justify-between items-end mb-2 px-1">
                         <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Soru {currentIndex + 1} / {questions.length}</span>
                         <span className="text-xs font-bold text-amber-600 bg-amber-100 border border-amber-200 px-3 py-1 rounded-full shadow-sm">
                            {score} Doğru
                         </span>
                     </div>
                     <div className="w-full h-3 bg-slate-200/80 rounded-full overflow-hidden mb-4 shadow-inner border border-slate-100">
                         <div className="h-full bg-gradient-to-r from-blue-400 to-blue-500 rounded-full transition-all duration-500 ease-out" style={{ width: `${progressPercent}%` }}></div>
                     </div>
                     <div className="text-center min-h-[1.5rem] pop-in" key={motivationStr}>
                         <p className="text-sm font-bold text-rose-500 drop-shadow-sm">{motivationStr}</p>
                     </div>
                 </div>

                 {/* Soru Alanı */}
                 <div className="flex-1 flex items-center justify-center mb-6">
                     <div className="glass-panel w-full p-8 md:p-12 rounded-[2.5rem] bg-white/95 text-center shadow-[0_20px_40px_-15px_rgba(0,0,0,0.15)] border-2 border-white relative">
                         <div className="absolute -top-5 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-widest shadow-md">
                             Eş Anlamlısı Nedir?
                         </div>
                         <h2 className="text-4xl md:text-5xl font-black text-slate-800 mt-2 tracking-tight pop-in drop-shadow-sm" key={currentQ.question}>
                             {currentQ.question}
                         </h2>
                     </div>
                 </div>

                 {/* Şıklar */}
                 <div className="grid grid-cols-2 gap-3 md:gap-4 shrink-0">
                     {currentQ.options.map((opt, idx) => {
                         let btnClass = "glass-panel bg-white/90 border-2 border-white text-slate-700 shadow-sm";
                         if (selectedOption) {
                             if (opt === currentQ.correct) {
                                 btnClass = "btn-correct";
                             } else if (opt === selectedOption) {
                                 btnClass = "btn-wrong";
                             } else {
                                 btnClass = "glass-panel bg-slate-100 text-slate-400 border-transparent opacity-50";
                             }
                         }

                         return (
                             <button 
                                key={idx} 
                                onClick={() => handleOptionClick(opt)}
                                disabled={selectedOption !== null}
                                className={`p-5 md:p-7 rounded-[1.5rem] text-lg md:text-xl font-black transition-all duration-300 ${btnClass} ${!selectedOption ? 'active:scale-95 hover:bg-white hover:shadow-md' : ''}`}
                             >
                                {opt}
                             </button>
                         );
                     })}
                 </div>
             </div>
          );
      }

      // 4. SONUÇ EKRANI (Tasarım Premium Hissiyata Yükseltildi, Dinamik XP Eklendi ve Çıkış Bilgisi Eklendi)
      if (view === 'result') {
          return (
             <div className="flex-1 flex flex-col p-4 md:p-8 h-full page-enter justify-center items-center text-center pt-safe pb-safe z-10 relative">
                 <div className="glass-panel rounded-[3rem] p-8 md:p-10 w-full bg-white/90 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.2)] border border-white/80 relative overflow-hidden text-center pop-in">
                     
                     {/* Premium Arka Plan Işıltısı */}
                     <div className="absolute top-0 left-0 w-full h-32 bg-gradient-to-br from-amber-100 to-orange-50 opacity-60 pointer-events-none"></div>

                     {/* İkon */}
                     <div className="w-28 h-28 mx-auto bg-gradient-to-br from-amber-300 to-orange-500 rounded-full flex items-center justify-center text-6xl mb-6 shadow-xl shadow-amber-500/40 border-4 border-white animate-[bounce_2s_infinite] relative z-10">
                         🏆
                     </div>

                     <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-2 tracking-tight relative z-10">Harika İş Çıkardın!</h2>
                     <p className="text-slate-500 font-bold mb-8 relative z-10">Seninle gurur duyuyoruz {userName}.</p>
                     
                     {/* İstatistik Alanı */}
                     <div className="bg-white rounded-[2rem] p-6 mb-6 border border-slate-100 shadow-lg flex justify-around relative z-10 transform transition hover:scale-105 duration-300">
                        <div className="flex-1">
                           <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Doğru Sayısı</p>
                           <p className="text-4xl font-black text-emerald-500 drop-shadow-sm">{score}<span className="text-xl text-slate-300">/{questions.length}</span></p>
                        </div>
                        <div className="w-px bg-slate-200 mx-2"></div>
                        <div className="flex-1">
                           <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Kazanılan XP</p>
                           <p className="text-4xl font-black text-amber-500 flex items-center justify-center gap-1 drop-shadow-sm">
                              <IconStar size={28}/> +{score}
                           </p>
                        </div>
                     </div>

                     {/* Premium Çıkış Yönlendirme Paneli */}
                     <div className="mb-8 p-4 bg-gradient-to-r from-blue-50/80 via-indigo-50/80 to-blue-50/80 rounded-2xl border border-blue-100 flex items-start gap-4 text-left shadow-inner relative z-10">
                         <div className="text-blue-500 shrink-0 mt-0.5"><IconInfo size={24} /></div>
                         <p className="text-xs md:text-sm font-semibold text-slate-600 leading-relaxed">
                            Kazandığın XP puanları ana hesabına başarıyla eklendi! Başka bir derse veya oyuna geçiş yapmak için en üstteki <span className="font-black text-slate-800 bg-white px-2 py-0.5 rounded-md shadow-sm border border-slate-200 whitespace-nowrap">Ana Ekrana Dön</span> butonunu kullanabilirsin.
                         </p>
                     </div>

                     <div className="flex flex-col md:flex-row gap-3 relative z-10">
                        <button onClick={startNewGame} className="flex-1 bg-gradient-to-r from-slate-800 to-slate-900 text-white font-bold text-lg py-4 rounded-[1.5rem] shadow-xl hover-lift">
                           Tekrar Oyna 🚀
                        </button>
                        <button onClick={() => { playSound('click'); setView('menu'); }} className="flex-1 bg-white text-slate-700 font-bold text-lg py-4 rounded-[1.5rem] border border-slate-200 shadow-sm hover-lift">
                           Oyun Menüsü
                        </button>
                     </div>
                 </div>
             </div>
          );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
