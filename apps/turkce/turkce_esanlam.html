<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eş Anlamlı Kelimeler - Egit.men</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    body { 
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none; 
      background-color: #f8fafc;
    }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 16px); }

    /* Arka Plan Derinliği (Türkçe için Rose/Kırmızı tonları) */
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }

    /* Ultra Fade Geçişleri */
    .page-enter { animation: ultraFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    @keyframes ultraFadeIn {
      0% { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* Glassmorphism */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    .hover-lift { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease; }
    .hover-lift:active { transform: scale(0.95); }

    /* Hata Durumu için Titreme (Shake) Animasyonu */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
  </style>
</head>
<body class="flex justify-center h-screen overflow-hidden bg-slate-100 text-slate-800">

  <!-- Tema Rengi: Türkçe için Rose/Kırmızı Ambient -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-rose-400/20 rounded-full blur-[120px] animate-blob"></div>
    <div class="absolute top-[30%] right-[-10%] w-[50%] h-[50%] bg-red-400/20 rounded-full blur-[100px] animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-[70%] h-[70%] bg-pink-400/20 rounded-full blur-[120px] animate-blob animation-delay-4000"></div>
  </div>

  <div id="root" class="w-full md:max-w-md lg:max-w-3xl h-full relative z-10 flex flex-col mx-auto overflow-hidden"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- SES MOTORU ---
    let audioCtx = null;
    const playSound = (type) => {
      const isMuted = JSON.parse(localStorage.getItem('egit_muted')) || false;
      if (isMuted) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      
      if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
      } else if (type === 'correct') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.setValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      } else if (type === 'fanfare') {
        osc.type = 'square';
        [392.00, 523.25, 659.25, 783.99].forEach((freq, i) => {
          osc.frequency.setValueAtTime(freq, now + (i*0.1));
        });
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
        gain.gain.setValueAtTime(0.15, now + 0.3);
        gain.gain.linearRampToValueAtTime(0, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
      }
    };

    // --- İKONLAR ---
    const IconHome = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
    const IconBookOpen = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const IconGamepad = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>;
    const IconTrophy = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const IconInfo = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
    const IconArrowLeft = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const IconClock = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const IconStar = ({ size, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

    // Eş Anlamlı Kelimeler Veritabanı
    const WORD_PAIRS = [
      { id: 1, word1: 'Siyah', word2: 'Kara' },
      { id: 2, word1: 'Doktor', word2: 'Hekim' },
      { id: 3, word1: 'Öğretmen', word2: 'Muallim' },
      { id: 4, word1: 'İhtiyar', word2: 'Yaşlı' },
      { id: 5, word1: 'Cevap', word2: 'Yanıt' },
      { id: 6, word1: 'Misafir', word2: 'Konuk' },
      { id: 7, word1: 'Doğa', word2: 'Tabiat' },
      { id: 8, word1: 'Öğrenci', word2: 'Talebe' },
      { id: 9, word1: 'Yürek', word2: 'Kalp' },
      { id: 10, word1: 'Güz', word2: 'Sonbahar' },
      { id: 11, word1: 'Hızlı', word2: 'Süratli' },
      { id: 12, word1: 'Zaman', word2: 'Vakit' }
    ];

    function App() {
      const userName = JSON.parse(localStorage.getItem('egit_userName')) || 'Kahraman';
      const userAvatar = JSON.parse(localStorage.getItem('egit_userAvatar')) || '🦸‍♂️';
      const points = JSON.parse(localStorage.getItem('egit_points')) || 0;
      
      const [dailyTimeSeconds, setDailyTimeSeconds] = useState(() => JSON.parse(localStorage.getItem('egit_dailyTime')) || 0);
      const timeLimitMinutes = JSON.parse(localStorage.getItem('egit_timeLimit')) || 30;

      // Oyun Durumları: intro, playing, gameover
      const [gameState, setGameState] = useState('intro');
      
      const [leftWords, setLeftWords] = useState([]);
      const [rightWords, setRightWords] = useState([]);
      const [selectedLeft, setSelectedLeft] = useState(null);
      const [selectedRight, setSelectedRight] = useState(null);
      const [matchedIds, setMatchedIds] = useState([]);
      const [wrongMatch, setWrongMatch] = useState(false);

      // Ana Uygulamaya Yönlendirme
      const navigateToApp = () => {
        playSound('click');
        window.location.href = '../../index.html'; // Ana sayfaya döner
      };

      // Zaman Kontrolü (Arka planda günlük süreyi işlemeye devam eder)
      useEffect(() => {
        const interval = setInterval(() => {
            setDailyTimeSeconds(prev => {
              const newVal = prev + 1;
              localStorage.setItem('egit_dailyTime', JSON.stringify(newVal));
              return newVal;
            });
        }, 1000);
        return () => clearInterval(interval);
      }, []);

      // Oyunu Başlat ve Kelimeleri Hazırla
      const startGame = () => {
        playSound('click');
        
        // Rastgele 5 çift seç
        const shuffledPairs = [...WORD_PAIRS].sort(() => 0.5 - Math.random()).slice(0, 5);
        
        // Sol ve sağ sütunları oluştur ve ayrı ayrı karıştır
        const lefts = shuffledPairs.map(p => ({ id: `L${p.id}`, pairId: p.id, text: p.word1 })).sort(() => 0.5 - Math.random());
        const rights = shuffledPairs.map(p => ({ id: `R${p.id}`, pairId: p.id, text: p.word2 })).sort(() => 0.5 - Math.random());

        setLeftWords(lefts);
        setRightWords(rights);
        setMatchedIds([]);
        setSelectedLeft(null);
        setSelectedRight(null);
        setWrongMatch(false);
        setGameState('playing');
      };

      // Eşleştirme Kontrolü
      useEffect(() => {
        if (selectedLeft && selectedRight) {
            const leftWord = leftWords.find(w => w.id === selectedLeft);
            const rightWord = rightWords.find(w => w.id === selectedRight);

            if (leftWord.pairId === rightWord.pairId) {
                // Doğru Eşleşme
                playSound('correct');
                setMatchedIds(prev => [...prev, leftWord.pairId]);
                setSelectedLeft(null);
                setSelectedRight(null);
            } else {
                // Yanlış Eşleşme
                playSound('wrong');
                setWrongMatch(true);
                setTimeout(() => {
                    setSelectedLeft(null);
                    setSelectedRight(null);
                    setWrongMatch(false);
                }, 500);
            }
        }
      }, [selectedLeft, selectedRight, leftWords, rightWords]);

      // Kazanma Kontrolü
      useEffect(() => {
        if (matchedIds.length === 5 && gameState === 'playing') {
            setTimeout(() => {
                setGameState('gameover');
                playSound('fanfare');
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                
                // 50 Puan Ekle
                const currentTotalPoints = JSON.parse(localStorage.getItem('egit_points')) || 0;
                localStorage.setItem('egit_points', JSON.stringify(currentTotalPoints + 50));
            }, 600);
        }
      }, [matchedIds, gameState]);

      return (
        <div className="flex-1 flex flex-col relative w-full h-full font-sans text-slate-800">
          
          {/* Yüzen Header (Tıpkı Ana Sayfadaki Gibi) */}
          <header className="absolute top-0 w-full z-20 px-4 pt-safe flex justify-center">
            <div className="w-full max-w-4xl glass-panel rounded-full px-4 py-3 mt-2 flex justify-between items-center shadow-sm">
              <div className="flex items-center gap-3">
                <button onClick={navigateToApp} className="w-10 h-10 bg-white/50 rounded-full flex items-center justify-center text-slate-600 hover-lift">
                  <IconArrowLeft size={20} />
                </button>
                <div className="hidden md:block">
                  <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Kahraman</p>
                  <h2 className="text-sm font-black text-slate-800 leading-none">{userName}</h2>
                </div>
              </div>
              
              <div className="flex items-center gap-2">
                <div className="flex items-center gap-1.5 bg-slate-100/80 text-slate-600 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm border border-white/50">
                  <IconClock size={16} />
                  <span>{Math.max(0, timeLimitMinutes - Math.floor(dailyTimeSeconds / 60))}m</span>
                </div>
                <div className="flex items-center gap-1.5 bg-amber-100/80 text-amber-700 px-3 py-1.5 rounded-full font-black text-sm shadow-sm border border-white/50">
                  <IconStar size={16} className="fill-amber-500" />
                  <span>{points}</span>
                </div>
              </div>
            </div>
          </header>

          {/* MAIN İÇERİK */}
          <main className="flex-1 overflow-y-auto px-4 md:px-8 pt-28 pb-36 no-scrollbar flex flex-col items-center">
            <div className="w-full max-w-md mx-auto flex-1 flex flex-col">
              
              {gameState === 'intro' && (
                <div className="flex-1 flex flex-col justify-center page-enter">
                  <div className="glass-panel rounded-[3rem] p-10 w-full text-center shadow-xl border-2 border-white relative overflow-hidden">
                    <div className="w-24 h-24 mx-auto bg-gradient-to-br from-rose-400 to-red-500 rounded-3xl flex items-center justify-center text-5xl mb-6 shadow-lg shadow-red-500/30 rotate-3">
                      🔗
                    </div>
                    <h1 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">Eş Anlam</h1>
                    <p className="text-slate-500 font-medium mb-8 text-sm leading-relaxed">
                      Aynı anlama gelen kelimeleri birbiriyle eşleştir. Tüm kelimeleri tamamla ve <span className="text-amber-500 font-bold">50 Puan</span> kazan!
                    </p>
                    <button onClick={startGame} className="w-full bg-slate-900 text-white text-xl font-black py-5 rounded-[1.5rem] shadow-xl hover-lift uppercase tracking-widest">
                      Oyuna Başla
                    </button>
                  </div>
                </div>
              )}

              {gameState === 'playing' && (
                <div className="flex-1 flex flex-col justify-center page-enter">
                  <div className="text-center mb-8">
                     <h2 className="text-2xl font-black text-slate-800">Eşlerini Bul!</h2>
                     <p className="text-slate-500 text-sm font-medium mt-1">Önce bir kelime seç, sonra eşini bul.</p>
                  </div>

                  <div className="flex gap-4 w-full">
                     {/* Sol Sütun */}
                     <div className="flex-1 space-y-3">
                        {leftWords.map(w => {
                           const isMatched = matchedIds.includes(w.pairId);
                           const isSelected = selectedLeft === w.id;
                           
                           let btnClass = "bg-white/70 text-slate-700 border-white/50 hover:bg-white";
                           if (isMatched) {
                             btnClass = "bg-emerald-100/50 text-emerald-600 border-emerald-200 opacity-50 scale-95 pointer-events-none";
                           } else if (isSelected) {
                             btnClass = wrongMatch 
                                ? "bg-red-100 text-red-600 border-red-400 animate-shake" 
                                : "bg-blue-500 text-white border-blue-400 scale-105 shadow-lg shadow-blue-500/30";
                           }

                           return (
                             <button 
                               key={w.id} 
                               onClick={() => { if(!isMatched && !wrongMatch) { playSound('click'); setSelectedLeft(w.id); } }} 
                               className={`w-full h-16 rounded-[1.5rem] font-bold text-base border-2 transition-all duration-300 shadow-sm ${btnClass}`}
                             >
                               {w.text}
                             </button>
                           )
                        })}
                     </div>

                     {/* Sağ Sütun */}
                     <div className="flex-1 space-y-3">
                        {rightWords.map(w => {
                           const isMatched = matchedIds.includes(w.pairId);
                           const isSelected = selectedRight === w.id;
                           
                           let btnClass = "bg-white/70 text-slate-700 border-white/50 hover:bg-white";
                           if (isMatched) {
                             btnClass = "bg-emerald-100/50 text-emerald-600 border-emerald-200 opacity-50 scale-95 pointer-events-none";
                           } else if (isSelected) {
                             btnClass = wrongMatch 
                                ? "bg-red-100 text-red-600 border-red-400 animate-shake" 
                                : "bg-rose-500 text-white border-rose-400 scale-105 shadow-lg shadow-rose-500/30";
                           }

                           return (
                             <button 
                               key={w.id} 
                               onClick={() => { if(!isMatched && !wrongMatch) { playSound('click'); setSelectedRight(w.id); } }} 
                               className={`w-full h-16 rounded-[1.5rem] font-bold text-base border-2 transition-all duration-300 shadow-sm ${btnClass}`}
                             >
                               {w.text}
                             </button>
                           )
                        })}
                     </div>
                  </div>
                </div>
              )}

              {gameState === 'gameover' && (
                <div className="flex-1 flex flex-col justify-center page-enter">
                  <div className="glass-panel rounded-[3rem] p-10 w-full text-center shadow-xl border-2 border-white relative overflow-hidden">
                    <div className="absolute -top-10 -right-10 p-4 opacity-10 animate-pulse">
                      <IconStar size={150} className="text-amber-500"/>
                    </div>
                    
                    <div className="text-6xl mb-6 relative z-10">🎉</div>
                    <h2 className="text-3xl font-black text-slate-800 mb-2">Harika İş Çıkardın!</h2>
                    <p className="text-slate-500 font-bold mb-8">
                      Tüm kelimeleri doğru eşleştirdin.
                    </p>
                    
                    <div className="bg-white/50 rounded-[2rem] p-6 mb-8 border border-white">
                      <div className="flex justify-between items-center">
                        <span className="text-amber-600 font-bold uppercase tracking-widest text-xs flex items-center gap-1">
                          <IconStar size={14}/> Kazanılan Puan
                        </span>
                        <span className="text-3xl font-black text-amber-500">+50</span>
                      </div>
                    </div>

                    <div className="space-y-3 relative z-10">
                      <button onClick={startGame} className="w-full bg-slate-900 text-white font-black text-lg py-4 rounded-[1.5rem] shadow-xl hover-lift uppercase tracking-widest">
                        Tekrar Oyna
                      </button>
                      <button onClick={navigateToApp} className="w-full bg-white text-slate-600 border border-slate-200 font-bold text-lg py-4 rounded-[1.5rem] hover-lift">
                        Derslere Dön
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          </main>

          {/* Yüzen Bottom Nav (Uygulamanın Tüm Sayfalarında Sabit) */}
          <div className="absolute bottom-0 w-full flex justify-center pb-safe pointer-events-none z-30">
            <nav className="glass-nav pointer-events-auto w-[90%] max-w-md rounded-[2rem] px-2 py-2 flex justify-between items-center mb-6 shadow-ultra">
              {[
                { id: 'home', icon: IconHome, label: 'Ana Sayfa' },
                { id: 'lessons', icon: IconBookOpen, label: 'Dersler' },
                { id: 'games', icon: IconGamepad, label: 'Oyunlar' },
                { id: 'profile', icon: IconTrophy, label: 'Profil' },
                { id: 'about', icon: IconInfo, label: 'Bilgi' }
              ].map((item) => {
                const isActive = item.id === 'lessons'; // Bu sayfa bir ders olduğu için Lessons aktif kalır
                const Icon = item.icon;
                return (
                  <button key={item.id} onClick={navigateToApp} className={`flex flex-col items-center justify-center flex-1 h-14 rounded-2xl relative transition-all duration-300 ${isActive ? 'bg-slate-100/50' : 'hover:bg-white/40'}`}>
                    <div className={`transition-transform duration-400 cubic-bezier(0.175, 0.885, 0.32, 1.275) flex flex-col items-center ${isActive ? '-translate-y-1 scale-110 text-slate-800' : 'text-slate-400'}`}>
                      <Icon size={24} />
                    </div>
                    {isActive && <span className="absolute bottom-2 w-1 h-1 bg-slate-800 rounded-full animate-pop-in"></span>}
                  </button>
                );
              })}
            </nav>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
