  <style>
    /* Ultra Premium Tipografi ve Genel Ayarlar */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    html {
        /* JS ile dinamik olarak değiştirilecek olan varsayılan kök boyut */
        font-size: 16px; 
        transition: font-size 0.3s ease;
    }

    body { 
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none; 
      background-color: #f8fafc;
    }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 16px); }
    
    /* 1. Ambient Blob Animasyonları (Arka Plan Derinliği) */
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }

    /* 2. Sinematik Sayfa Geçişi */
    .page-enter { 
      animation: premiumSlideUp 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    @keyframes premiumSlideUp {
      0% { opacity: 0; transform: translateY(40px) scale(0.96); filter: blur(12px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* Modallar İçin Ekstra Hızlı Giriş */
    .modal-enter {
      animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes modalPop {
      0% { opacity: 0; transform: scale(0.9) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 3. Gerçekçi Glassmorphism (Buzlu Cam) */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.05),
        0 2px 4px -1px rgba(0, 0, 0, 0.03),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }
    
    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    }

    /* 4. Ultra Premium Gölgeler ve Hover Efektleri */
    .shadow-ultra {
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.02);
    }
    
    .hover-lift {
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }
    .hover-lift:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.02);
    }
    .hover-lift:active {
      transform: translateY(2px) scale(0.98);
    }

    /* Diğer Animasyonlar */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
    
    /* Özel Scrollbar Gizleme */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    // --- SES MOTORU (Ultra Soft) ---
    let audioCtx = null;
    const playSound = (type) => {
      const isMuted = JSON.parse(localStorage.getItem('egit_muted')) || false;
      if (isMuted) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      
      if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.04);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
        osc.start(now); osc.stop(now + 0.04);
      } else if (type === 'fanfare') {
        osc.type = 'triangle';
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
          osc.frequency.setValueAtTime(freq, now + (i*0.08));
        });
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.1, now + 0.04);
        gain.gain.setValueAtTime(0.1, now + 0.24);
        gain.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
      } else if (type === 'error') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
      }
    };

      '04-23': { title: '23 Nisan Kutlu Olsun!', msg: 'Ulusal Egemenlik ve Çocuk Bayramın kutlu olsun kahraman! Bugün senin günün!', icon: '🇹🇷', confettiColors: ['#ff0000', '#ffffff'] },
      '05-19': { title: '19 Mayıs Kutlu Olsun!', msg: 'Atatürk\'ü Anma, Gençlik ve Spor Bayramımız kutlu olsun!', icon: '🇹🇷', confettiColors: ['#ff0000', '#ffffff'] },
      '08-30': { title: '30 Ağustos Kutlu Olsun!', msg: 'Büyük Taarruz\'un yıl dönümünde Zafer Bayramımız kutlu olsun!', icon: '🇹🇷', confettiColors: ['#ff0000', '#ffffff'] },
      '10-29': { title: '29 Ekim Kutlu Olsun!', msg: 'Yaşasın Cumhuriyet! Cumhuriyet Bayramımız kutlu olsun!', icon: '🇹🇷', confettiColors: ['#ff0000', '#ffffff'] },
      '11-10': { title: 'Saygıyla Anıyoruz...', msg: 'Ulu Önder Mustafa Kemal Atatürk\'ü saygı, sevgi ve özlemle anıyoruz.', icon: '♾️', confettiColors: ['#000000', '#ffffff'] }
    };

    const getLevelInfo = (points) => {
      let prevMax = 0;
      for (let i = 0; i < LEVELS.length; i++) {
        if (points <= LEVELS[i].max) {
          const progress = points >= LEVELS[i].max ? 100 : Math.max(5, ((points - prevMax) / (LEVELS[i].max - prevMax)) * 100);
          return { ...LEVELS[i], progress, nextMax: LEVELS[i].max, prevMax };
        }
        prevMax = LEVELS[i].max;
      }
      return { ...LEVELS[LEVELS.length - 1], progress: 100, nextMax: 'Maks', prevMax };
    };

    const TABS = ['home', 'lessons', 'games', 'profile', 'about'];

    // --- PROFİL DÜZENLEME MODALI ---
    function ProfileSetupModal({ initialName, initialAvatar, onSave, onCancel, isCancellable, showAlert }) {
      const [name, setName] = useState(initialName || '');
      const [avatar, setAvatar] = useState(initialAvatar || AVATARS[0]);

      const handleSave = () => {
        if(name.trim().length < 2) {
          playSound('error');
          showAlert('Eksik Bilgi', 'Lütfen en az 2 harfli bir isim gir kahraman!');
          return;
        }
        playSound('click');
        onSave(name.trim(), avatar);
      };

      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xl z-[100] flex items-center justify-center p-4 animate-in fade-in duration-300">
          <div className="glass-panel rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl relative modal-enter text-center">
            {isCancellable && (
              <button onClick={() => { playSound('click'); onCancel(); }} className="absolute top-5 right-5 text-slate-400 hover:text-slate-700 bg-white/50 backdrop-blur rounded-full p-2 hover-lift">
                <IconX size={20} />
              </button>
            )}
            
            <h2 className="text-2xl font-black text-slate-800 mb-8 tracking-tight">Kahramanını Hazırla!</h2>
            
            <div className="mb-8">
              <label className="block text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Avatarını Seç</label>
              <div className="grid grid-cols-4 gap-3 bg-white/50 p-4 rounded-[2rem] border border-white/60 shadow-inner">
                {AVATARS.map(a => (
                  <button 
                    key={a} 
                    onClick={() => { playSound('click'); setAvatar(a); }} 
                    className={`text-3xl p-2 rounded-2xl transition-all duration-300 ${avatar === a ? 'bg-blue-500/10 ring-2 ring-blue-500 shadow-sm scale-110' : 'hover:scale-110 active:scale-95 grayscale-[30%]'}`}
                  >
                    {a}
                  </button>
                ))}
              </div>
            </div>

            <div className="mb-10">
              <label className="block text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Adın Ne?</label>
              <input 
                type="text" 
                value={name} 
                onChange={(e) => setName(e.target.value)} 
                maxLength={12}
                placeholder="Örn: Can" 
                className="w-full text-center text-3xl font-black p-4 bg-white/60 border border-white rounded-[1.5rem] focus:border-blue-400 focus:ring-4 focus:ring-blue-400/20 outline-none transition-all placeholder:text-slate-300 shadow-inner text-slate-700" 
              />
            </div>

            <button onClick={handleSave} className="w-full bg-slate-900 text-white font-bold text-lg py-5 rounded-[1.5rem] shadow-xl hover-lift">
              {isCancellable ? 'Değişiklikleri Kaydet' : 'Maceraya Başla 🚀'}
            </button>
          </div>
        </div>
      );
    }

    // --- ÖZEL GÜN KUTLAMA MODALI ---
    function SpecialDayModal({ info, onClose }) {
      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[150] flex items-center justify-center p-4 animate-in fade-in duration-300">
           <div className="glass-panel rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl relative modal-enter text-center border-2 border-white">
              <div className="text-7xl mb-6 animate-bounce">{info.icon}</div>
              <h2 className="text-3xl font-black text-slate-800 mb-4 tracking-tight leading-tight">{info.title}</h2>
              <p className="text-slate-600 font-medium leading-relaxed mb-8">{info.msg}</p>
              <button onClick={() => { playSound('click'); onClose(); }} className="w-full bg-slate-900 text-white font-bold text-lg py-5 rounded-[1.5rem] shadow-xl hover-lift">
                Teşekkürler! 🎈
              </button>
           </div>
        </div>
      );
    }

    function App() {
      const [appState, setAppState] = useState('splash');
      const [activeTab, setActiveTab] = useState('home');
      
      const [userName, setUserName] = useState(() => loadState('egit_userName', ''));
      const [userAvatar, setUserAvatar] = useState(() => loadState('egit_userAvatar', ''));
      const [points, setPoints] = useState(() => loadState('egit_points', 0));
      const [unlockedBadges, setUnlockedBadges] = useState(() => loadState('egit_badges', []));
      
      const [dailyTimeSeconds, setDailyTimeSeconds] = useState(() => loadState('egit_dailyTime', 0));
      const [lastPlayedDate, setLastPlayedDate] = useState(() => loadState('egit_lastDate', new Date().toDateString()));
      
      // Ayarlar State'leri
      const [timeLimitMinutes, setTimeLimitMinutes] = useState(() => loadState('egit_timeLimit', 30)); 
      const [textSize, setTextSize] = useState(() => loadState('egit_textSize', 16)); 
      
      // Panel ve Durum State'leri
      const [isParentPanelOpen, setIsParentPanelOpen] = useState(false);
      const [isEditingProfile, setIsEditingProfile] = useState(false);
      const [isLockedByTime, setIsLockedByTime] = useState(false);
      const [parentAuthOpen, setParentAuthOpen] = useState(false); // Veli Şifre Modalı

      // Özel Bildirim State'leri
      const [alertConfig, setAlertConfig] = useState(null); // { title, message }
      const [confirmConfig, setConfirmConfig] = useState(null); // { title, message, onConfirm }
      
      const [specialDayInfo, setSpecialDayInfo] = useState(null);
      const [selectedLessonCat, setSelectedLessonCat] = useState(null);

      const [touchStartX, setTouchStartX] = useState(null);
      const [touchEndX, setTouchEndX] = useState(null);

      const mainScrollRef = useRef(null);
      const currentLevelInfo = getLevelInfo(points);

      const dailyContentIndex = Math.floor(Date.now() / (1000 * 60 * 60 * 24)) % DAILY_CONTENTS.length;
      const todayContent = DAILY_CONTENTS[dailyContentIndex];

      // Yazı/Ekran Boyutunu Uygulama (Tüm Tailwind rem değerlerini oranlar)
      useEffect(() => {
        document.documentElement.style.fontSize = `${textSize}px`;
      }, [textSize]);

      useEffect(() => {
        if (mainScrollRef.current) mainScrollRef.current.scrollTop = 0;
      }, [activeTab, selectedLessonCat]);

      const handleTabChange = (tabId) => {
        if (activeTab !== tabId) {
          playSound('click');
          setActiveTab(tabId);
          setSelectedLessonCat(null);
        }
      };

      // Modalları Çağırma Yardımcıları
      const showAlert = (title, message) => {
        playSound('error');
        setAlertConfig({ title, message });
      };

      const showConfirm = (title, message, onConfirm) => {
        playSound('click');
        setConfirmConfig({ title, message, onConfirm });
      };

      // Veli Paneli Giriş Tetikleyicisi
      const handleOpenParentPanel = () => {
        playSound('click');
        setParentAuthOpen(true);
      };

      useEffect(() => {
        if (appState === 'splash') {
          const timer = setTimeout(() => {
            if (!userName) setAppState('onboarding');
            else setAppState('welcome');
          }, 2000);
          return () => clearTimeout(timer);
        }
      }, [appState, userName]);

      useEffect(() => {
        if (appState === 'main') {
           const today = new Date();
           const month = String(today.getMonth() + 1).padStart(2, '0');
           const day = String(today.getDate()).padStart(2, '0');
           const year = today.getFullYear();
           const dateKey = `${month}-${day}`;
           
           if (SPECIAL_DAYS[dateKey]) {
              const storageKey = `egit_celebrated_${dateKey}_${year}`;
              if (!localStorage.getItem(storageKey)) {
                 setSpecialDayInfo(SPECIAL_DAYS[dateKey]);
                 localStorage.setItem(storageKey, 'true');
                 
                 setTimeout(() => {
                   confetti({ particleCount: 200, spread: 120, origin: { y: 0.5 }, colors: SPECIAL_DAYS[dateKey].confettiColors });
                   playSound('fanfare');
                 }, 500);
              }
           }
        }
      }, [appState]);

      useEffect(() => {
        const today = new Date().toDateString();
        if (today !== lastPlayedDate) {
          setDailyTimeSeconds(0); setLastPlayedDate(today);
          saveState('egit_dailyTime', 0); saveState('egit_lastDate', today);
        }
        const interval = setInterval(() => {
          if (!isParentPanelOpen && !parentAuthOpen && !isLockedByTime && !specialDayInfo && !alertConfig && !confirmConfig && appState === 'main') {
            setDailyTimeSeconds(prev => {
              const newVal = prev + 1;
              saveState('egit_dailyTime', newVal);
              return newVal;
            });
          }
        }, 1000);
        return () => clearInterval(interval);
      }, [lastPlayedDate, isParentPanelOpen, parentAuthOpen, isLockedByTime, specialDayInfo, alertConfig, confirmConfig, appState]);

      useEffect(() => setIsLockedByTime(dailyTimeSeconds >= timeLimitMinutes * 60), [dailyTimeSeconds, timeLimitMinutes]);

      useEffect(() => {
        saveState('egit_points', points);
        let shouldPlayConfetti = false;
        const newBadges = [...unlockedBadges];
        BADGES.forEach(badge => {
          if (points >= badge.requiredPoints && !newBadges.includes(badge.id)) {
            newBadges.push(badge.id);
            shouldPlayConfetti = true;
          }
        });
        if (shouldPlayConfetti && appState === 'main') {
          setUnlockedBadges(newBadges);
          saveState('egit_badges', newBadges);
          confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        }
      }, [points, appState]);

      const onTouchStart = (e) => { setTouchEndX(null); setTouchStartX(e.targetTouches[0].clientX); };
      const onTouchMove = (e) => { setTouchEndX(e.targetTouches[0].clientX); };
      const onTouchEnd = () => {
        if (!touchStartX || !touchEndX || isLockedByTime || isParentPanelOpen || parentAuthOpen || specialDayInfo || alertConfig || confirmConfig || appState !== 'main') return;
        const distance = touchStartX - touchEndX;
        if (Math.abs(distance) > 50) playSound('click');
        const currentIndex = TABS.indexOf(activeTab);
        if (distance > 50 && currentIndex < TABS.length - 1) setActiveTab(TABS[currentIndex + 1]);
        else if (distance < -50 && currentIndex > 0) setActiveTab(TABS[currentIndex - 1]);
      };

      const launchApp = (path) => {
        playSound('click');
        if (path === '#') showAlert('Yakında', 'Bu içerik çok yakında eklenecek kahraman!');
        else setTimeout(() => { window.location.href = path; }, 200);
      };

      // -- EKRAN 1: SPLASH --
      if (appState === 'splash') {
        return (
          <div className="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-50">
            <div className="bg-white p-6 rounded-[2rem] shadow-2xl mb-8 animate-bounce">
              <IconBookOpen size={64} className="text-slate-900" />
            </div>
            <h1 className="text-3xl font-black text-white tracking-[0.3em] uppercase opacity-90">Egit.men</h1>
            <div className="mt-12 w-32 h-1 bg-slate-800 rounded-full overflow-hidden">
              <div className="w-1/2 h-full bg-white animate-[pulse_1.5s_ease-in-out_infinite] rounded-full"></div>
            </div>
          </div>
        );
      }

      // -- EKRAN 2: ONBOARDING --
      if (appState === 'onboarding') {
        return (
          <ProfileSetupModal 
            isCancellable={false}
            showAlert={showAlert}
            onSave={(name, avatar) => {
              setUserName(name); setUserAvatar(avatar);
              saveState('egit_userName', name); saveState('egit_userAvatar', avatar);
              playSound('fanfare'); confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
              setAppState('main');
            }}
          />
        );
      }

      // -- EKRAN 3: WELCOME --
      if (appState === 'welcome') {
        return (
          <div className="absolute inset-0 z-50 flex items-center justify-center p-6 page-enter bg-slate-900/40 backdrop-blur-2xl">
            <div className="glass-panel rounded-[3rem] p-10 w-full max-w-sm text-center shadow-2xl">
              <div className="w-32 h-32 mx-auto bg-white/50 backdrop-blur rounded-[2.5rem] flex items-center justify-center text-7xl mb-8 shadow-inner border border-white animate-float">
                {userAvatar}
              </div>
              <p className="text-xl font-bold text-slate-500 mb-1">Tekrar Hoş Geldin,</p>
              <h2 className="text-4xl font-black text-slate-800 mb-10 tracking-tight">{userName}!</h2>
              <button onClick={() => { playSound('fanfare'); setAppState('main'); }} className="w-full bg-slate-900 text-white text-xl font-bold py-5 rounded-[1.5rem] shadow-xl hover-lift">
                Maceraya Dön 🚀
              </button>
            </div>
          </div>
        );
      }

      // -- KİLİT EKRANI --
      if (isLockedByTime) {
        return (
          <div className="h-full w-full flex flex-col items-center justify-center bg-slate-900 text-white p-8 relative z-50">
            <div className="w-32 h-32 bg-slate-800 rounded-full flex items-center justify-center shadow-2xl border border-slate-700 mb-8 animate-float text-6xl">😴</div>
            <h1 className="text-3xl font-black text-center mb-4 tracking-tight">Bugünlük Bu Kadar,<br/>{userName}!</h1>
            <p className="text-center text-slate-400 text-lg mb-10 leading-relaxed max-w-sm">Günlük oyun süren doldu. Gözlerini dinlendir, kitap oku veya ailenle vakit geçir.</p>
            <button onClick={handleOpenParentPanel} className="absolute bottom-12 flex items-center gap-2 text-slate-400 font-bold px-6 py-4 bg-slate-800 rounded-full active:scale-95 transition-transform">
              <IconLock size={18} /> Veli Paneli
            </button>
            
            {/* Modal Yönetimleri Kilit Ekranında da Çalışmalı */}
            {parentAuthOpen && <ParentAuthModal />}
            {isParentPanelOpen && <ParentPanelModal />}
            {alertConfig && <CustomAlert />}
            {confirmConfig && <CustomConfirm />}
          </div>
        );
      }

      // --- ÖZEL MODALLAR (ALERT, CONFIRM, AUTH) ---
      
      const CustomAlert = () => (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[300] flex items-center justify-center p-4 animate-in fade-in">
          <div className="glass-panel rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl text-center modal-enter border-2 border-white">
            <div className="text-5xl mb-4">⚠️</div>
            <h2 className="text-2xl font-black text-slate-800 mb-2">{alertConfig.title}</h2>
            <p className="text-slate-600 mb-8 font-medium leading-relaxed">{alertConfig.message}</p>
            <button onClick={() => { playSound('click'); setAlertConfig(null); }} className="w-full bg-slate-900 text-white font-bold text-lg py-4 rounded-[1.5rem] hover-lift">Tamam</button>
          </div>
        </div>
      );

      const CustomConfirm = () => (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[300] flex items-center justify-center p-4 animate-in fade-in">
          <div className="glass-panel rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl text-center modal-enter border-2 border-white">
            <div className="text-5xl mb-4 animate-pulse">❓</div>
            <h2 className="text-2xl font-black text-slate-800 mb-2">{confirmConfig.title}</h2>
            <p className="text-slate-600 mb-8 font-medium leading-relaxed">{confirmConfig.message}</p>
            <div className="flex gap-4">
              <button onClick={() => { playSound('click'); setConfirmConfig(null); }} className="flex-1 bg-white text-slate-800 font-bold py-4 rounded-[1.5rem] border border-slate-200 hover-lift">İptal</button>
              <button onClick={() => { confirmConfig.onConfirm(); setConfirmConfig(null); }} className="flex-1 bg-red-500 text-white font-bold py-4 rounded-[1.5rem] hover-lift shadow-lg shadow-red-500/30">Evet, Onayla</button>
            </div>
          </div>
        </div>
      );

      const ParentAuthModal = () => (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[200] flex items-center justify-center p-4 animate-in fade-in">
          <div className="glass-panel rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl relative modal-enter text-center">
            <button onClick={() => { playSound('click'); setParentAuthOpen(false); }} className="absolute top-5 right-5 text-slate-400 hover:text-slate-700 bg-white/50 rounded-full p-2 hover-lift"><IconX size={20} /></button>
            <h2 className="text-xl font-black mb-4 flex justify-center items-center gap-2"><IconShield size={24} className="text-slate-800"/> Veli Doğrulaması</h2>
            <p className="text-slate-600 mb-6 font-medium text-sm">Lütfen aşağıdaki matematik işlemini çözün:<br/><span className="text-3xl font-black text-slate-800 tracking-widest mt-2 block">8 x 6 = ?</span></p>
            <input 
              type="number" 
              id="math-auth" 
              autoFocus
              onKeyDown={(e) => { if(e.key === 'Enter') document.getElementById('btn-auth-submit').click(); }}
              className="w-full text-center text-4xl font-black p-4 bg-white/60 border border-white rounded-[1.5rem] focus:border-blue-400 focus:ring-4 focus:ring-blue-400/20 outline-none mb-6 text-slate-700 shadow-inner" 
              placeholder="Cevap" 
            />
            <button 
              id="btn-auth-submit"
              onClick={() => {
                const val = document.getElementById('math-auth').value;
                if(val === "48") { playSound('click'); setParentAuthOpen(false); setIsParentPanelOpen(true); }
                else { showAlert('Hatalı Cevap', 'Girdiğiniz işlem sonucu yanlış. Lütfen tekrar deneyin.'); }
              }} 
              className="w-full bg-slate-900 text-white font-bold text-lg py-4 rounded-[1.5rem] hover-lift"
            >
              Doğrula ve Gir
            </button>
          </div>
        </div>
      );

      // -- VELİ PANELİ (AYARLAR) MODALI --
      const ParentPanelModal = () => (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[100] flex items-center justify-center p-4 animate-in fade-in">
          <div className="glass-panel rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl relative modal-enter text-slate-800 border-2 border-white">
            <button onClick={() => { playSound('click'); setIsParentPanelOpen(false); }} className="absolute top-5 right-5 text-slate-400 hover:text-slate-700 bg-white/50 rounded-full p-2 hover-lift">
              <IconX size={20} />
            </button>
            <h2 className="text-2xl font-black mb-8 flex items-center gap-3"><div className="bg-slate-100 p-2 rounded-xl border border-slate-200"><IconSettings size={24}/></div> Ayarlar</h2>
            
            <div className="mb-6">
              <label className="block text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Günlük Süre Limiti</label>
              <div className="flex items-center gap-4 bg-white/50 p-4 rounded-[1.5rem] border border-white shadow-sm">
                <input type="range" min="5" max="120" step="5" value={timeLimitMinutes} onChange={(e) => { const val = parseInt(e.target.value); setTimeLimitMinutes(val); saveState('egit_timeLimit', val); }} className="flex-1 accent-slate-800"/>
                <span className="font-black text-xl text-slate-800 w-12 text-right">{timeLimitMinutes}m</span>
              </div>
            </div>

            <div className="mb-10">
              <label className="block text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest flex justify-between">
                <span>Yazı ve Ekran Boyutu</span>
                <span className="text-slate-500 font-black">{textSize}px</span>
              </label>
              <div className="flex items-center gap-4 bg-white/50 p-4 rounded-[1.5rem] border border-white shadow-sm">
                <span className="text-sm font-black text-slate-400 cursor-pointer" onClick={() => {const v = Math.max(12, textSize-1); setTextSize(v); saveState('egit_textSize', v);}}>A-</span>
                <input type="range" min="12" max="22" step="1" value={textSize} onChange={(e) => { const val = parseInt(e.target.value); setTextSize(val); saveState('egit_textSize', val); }} className="flex-1 accent-blue-600"/>
                <span className="text-lg font-black text-slate-600 cursor-pointer" onClick={() => {const v = Math.min(22, textSize+1); setTextSize(v); saveState('egit_textSize', v);}}>A+</span>
              </div>
              <p className="text-[10px] font-bold text-slate-400 mt-2 text-center">İçerikler ekrana sığmıyorsa küçültebilirsiniz.</p>
            </div>

            <button onClick={() => { 
                showConfirm('Uygulamayı Sıfırla', 'Tüm kazanılan puanlar, rozetler ve ayarlar kalıcı olarak silinecek. Onaylıyor musunuz?', () => {
                  localStorage.clear(); window.location.reload(); 
                });
              }} 
              className="w-full bg-red-50 text-red-600 font-bold py-4 rounded-[1.5rem] border border-red-100 hover-lift flex justify-center items-center gap-2"
            >
              <IconLock size={18}/> Uygulamayı Sıfırla
            </button>
          </div>
        </div>
      );


      // -- 4. ANA EKRAN (MAIN) --
      return (
        <div className="flex-1 flex flex-col relative w-full h-full font-sans text-slate-800">
          
          {/* PROFİL DÜZENLEME MODALI */}
          {isEditingProfile && (
            <ProfileSetupModal 
              initialName={userName} initialAvatar={userAvatar} isCancellable={true} showAlert={showAlert}
              onCancel={() => setIsEditingProfile(false)}
              onSave={(name, avatar) => {
                setUserName(name); setUserAvatar(avatar);
                saveState('egit_userName', name); saveState('egit_userAvatar', avatar);
                setIsEditingProfile(false);
              }}
            />
          )}

          {/* DİĞER MODALLAR */}
          {specialDayInfo && <SpecialDayModal info={specialDayInfo} onClose={() => setSpecialDayInfo(null)} />}
          {parentAuthOpen && <ParentAuthModal />}
          {isParentPanelOpen && <ParentPanelModal />}
          {alertConfig && <CustomAlert />}
          {confirmConfig && <CustomConfirm />}

          {/* Yüzen Header (Floating Header) */}
          <header className="absolute top-0 w-full z-20 px-4 pt-safe flex justify-center">
            <div className="w-full max-w-4xl glass-panel rounded-full px-4 py-3 mt-2 flex justify-between items-center shadow-ultra transition-all">
              <div onClick={() => setActiveTab('profile')} className="flex items-center gap-3 cursor-pointer group">
                <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-xl shadow-sm border border-slate-100 group-hover:scale-105 transition-transform">
                  {userAvatar}
                </div>
                <div className="hidden md:block">

          {isParentPanelOpen || parentAuthOpen ? null : (
            <div className="absolute bottom-0 w-full flex justify-center pb-safe pointer-events-none z-30">
              <nav className="glass-nav pointer-events-auto w-[96%] max-w-lg rounded-[2.5rem] px-3 py-3 flex justify-between items-center mb-4 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.15)] border border-white/80">
                {[
                  { id: 'home', icon: IconHome, label: 'Ana Sayfa' },
                  { id: 'lessons', icon: IconBookOpen, label: 'Dersler' },
                  { id: 'games', icon: IconGamepad, label: 'Oyunlar' },
                  { id: 'profile', icon: IconTrophy, label: 'Profil' },
                  { id: 'about', icon: IconInfo, label: 'Bilgi' },
                  { id: 'settings', icon: IconSettings, label: 'Ayarlar', isAction: true } 
                ].map((item) => {
                  const isActive = activeTab === item.id && !item.isAction;
                  const Icon = item.icon;
                  return (
                    <button 
                      key={item.id} 
                      onClick={() => item.isAction ? handleOpenParentPanel() : handleTabChange(item.id)} 
                      className={`flex flex-col items-center justify-center flex-1 h-14 rounded-2xl relative transition-all duration-300 ${isActive ? 'bg-slate-100/50' : 'hover:bg-white/40 active:scale-95'}`}
                    >
                      <div className={`transition-transform duration-500 cubic-bezier(0.16, 1, 0.3, 1) flex flex-col items-center ${isActive ? '-translate-y-1 scale-110 text-slate-800' : 'text-slate-400'}`}>
                        <Icon size={22} />
                      </div>
                      {isActive && <span className="absolute bottom-2 w-1 h-1 bg-slate-800 rounded-full animate-pop-in"></span>}
                    </button>
                  );
                })}
              </nav>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
